<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>trying_ec2</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 2rem;
      width: 100%;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.85rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 540px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #58a6ff, #bc8cff, #ff7b72);
      border-radius: 16px 16px 0 0;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1f6feb, #388bfd);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem auto;
      box-shadow: 0 4px 20px rgba(56, 139, 253, 0.3);
    }

    .icon svg {
      width: 32px;
      height: 32px;
      fill: #fff;
    }

    .project-name {
      font-size: 2rem;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .project-name span {
      color: #58a6ff;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #8b949e;
      margin-bottom: 2rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 1.75rem 0;
    }

    .repo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 0.85rem 1.25rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      cursor: default;
    }

    .repo-section:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
    }

    .repo-icon {
      flex-shrink: 0;
      color: #8b949e;
    }

    .repo-icon svg {
      width: 18px;
      height: 18px;
      fill: #58a6ff;
      vertical-align: middle;
    }

    .repo-label {
      font-size: 0.78rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
      margin-right: 0.3rem;
    }

    .repo-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.01em;
      font-family: 'Courier New', Courier, monospace;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 1.75rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .stat-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    footer {
      width: 100%;
      text-align: center;
      padding: 1.25rem 2rem;
      border-top: 1px solid #21262d;
      color: #8b949e;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
    }

    footer strong {
      color: #bc8cff;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .project-name {
        font-size: 1.6rem;
      }

      .stats {
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="badge">&#x2022; Live Project</div>

    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0
            2-2V5a2 2 0 0 0-2-2zm-7 14l-5-5 1.41-1.41L12
            14.17l7.59-7.59L21 8l-9 9z"/>
        </svg>
      </div>

      <h1 class="project-name">trying<span>_ec2</span></h1>
      <p class="subtitle">AWS EC2 Deployment &amp; Infrastructure Project</p>

      <hr class="divider" />

      <div class="repo-section">
        <span class="repo-icon">
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75
              0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 1 1
              0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 0 1-1.072 1.05A2.495
              2.495 0 0 1 2 11.5v-9zm10.5-1V9h-8c-.356
              0-.694.074-1 .208V2.5a1 1 0 0 1 1-1h8zM5 12.25v3.25a.25.25 0 0 0
              .4.2l1.45-1.087a.25.25 0 0 1 .3 0L8.6 15.7a.25.25 0 0 0
              .4-.2v-3.25a.25.25 0 0 0-.25-.25h-3.5a.25.25 0 0 0-.25.25z"/>
          </svg>
        </span>
        <span class="repo-label">Repo:</span>
        <span class="repo-name">trying_ec2_repo</span>
      </div>

      <div class="stats">
        <div class="stat-item">
          <span class="stat-value">EC2</span>
          <span class="stat-label">Platform</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">AWS</span>
          <span class="stat-label">Cloud</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">v1.0</span>
          <span class="stat-label">Version</span>
        </div>
      </div>
    </div>
  </div>

  <footer>
    Developed by <strong>Royal Bengal AI</strong>
  </footer>

</body>
</html>
